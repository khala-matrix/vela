name: vela-website
services:
  - name: vela-website-backend
    image: registry.example.com/namespace/vela-website-backend:latest
    port: 8000
    replicas: 1
    env:
      - name: CORS_ORIGINS
        value: "*"
      - name: PYTHONUNBUFFERED
        value: "1"
    resources:
      cpu: 250m
      memory: 256Mi
    ingress:
      enabled: true
      host: vela-website-api.sandbox.cyber-psychosis.net
  - name: vela-website-frontend
    image: registry.example.com/namespace/vela-website-frontend:latest
    port: 3000
    replicas: 1
    resources:
      cpu: 250m
      memory: 256Mi
    ingress:
      enabled: true
      host: vela-website.sandbox.cyber-psychosis.net

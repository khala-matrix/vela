version: 2

builds:
  - main: .
    binary: vela
    ldflags:
      - -s -w
      - -X github.com/mars/vela/cmd.Version={{.Version}}
      - -X github.com/mars/vela/cmd.Commit={{.ShortCommit}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: binary
    name_template: "{{ .Binary }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: khala-matrix
    name: vela
